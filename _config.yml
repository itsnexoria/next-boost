title: Next Boost
description: Grow your social with real engagement
url: "https://boost.nexosites.xyz"
baseurl: ""

# Tell Jekyll not to process these
exclude:
  - README.md
  - LICENSE
  - MIGRATION.sql
  - "*.py"

# Pass through all directories and files as static
include:
  - assets
  - login
  - signup
  - dashboard
  - earn
  - leaderboard
  - post-task
  - my-tasks
  - completed
  - profile
  - settings
  - achievements
  - referral
  - store
  - task
  - u
  - admin
  - analytics
  - reset-password
  - confirm-email
  - guides
  - "404"
  - robots.txt
  - sitemap.xml
  - manifest.json
  - CNAME

# Disable Jekyll processing for plain HTML/XML
plugins: []

# Serve XML with correct content type
defaults: []
