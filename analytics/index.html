<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analytics — Next Boost</title><meta name="robots" content="noindex"/>
  <link rel="manifest" href="/manifest.json"/><meta name="theme-color" content="#E8621A"/>
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <link rel="stylesheet" href="/assets/css/app.css"/>
  <link rel="stylesheet" href="/assets/css/analytics.css"/>
</head>
<body>
<nav class="nav" id="main-nav"></nav>
<div class="app-shell">
  <aside class="app-sidebar" id="app-sidebar"></aside>
  <div class="page-content">
    <h1 class="page-title">Task Analytics</h1>
    <p class="page-sub">Performance data for all your tasks.</p>

    <div id="analytics-content">
      <div class="spinner"></div>
    </div>
  </div>
</div>
<nav class="mobile-nav-bar" id="mobile-nav"></nav>

<!-- Comments modal -->
<div class="modal-overlay" id="comments-modal">
  <div class="modal" style="max-width:520px">
    <h2 id="cm-title">Task Comments</h2>
    <p class="modal-sub" id="cm-sub"></p>
    <div id="cm-feed" style="max-height:300px;overflow-y:auto;margin-bottom:16px"></div>
    <div class="form-group">
      <label for="cm-input">Add a comment</label>
      <textarea id="cm-input" placeholder="Ask a question or leave feedback…" maxlength="500" rows="3"></textarea>
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:0.83rem;color:var(--muted);margin-bottom:14px;cursor:pointer">
      <input type="checkbox" id="cm-owner-note" style="accent-color:var(--orange)"/>
      Private owner note (only visible after task is started)
    </label>
    <div class="error-msg" id="cm-err"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('comments-modal').classList.remove('open')">Close</button>
      <button class="btn btn-primary" onclick="submitComment()">Post comment</button>
    </div>
  </div>
</div>

<script type="module">
import { supabase, esc } from '/assets/js/shared.js';
import { initApp } from '/assets/js/app.js';
const PE = { tiktok:'🎵', instagram:'📸', youtube:'▶️', discord:'💬', website:'🌐', twitch:'🟣' };
let profile, activeCommentTaskId = null;

async function main() {
  const ctx = await initApp('analytics');
  if (!ctx) return;
  profile = ctx.profile;
  await loadAnalytics();
}

async function loadAnalytics() {
  const wrap = document.getElementById('analytics-content');
  try {
    const { data: tasks, error } = await supabase
      .from('task_analytics')
      .select('*')
      .eq('owner_id', profile.id)
      .order('created_at', { ascending: false });

    if (error) throw error;
    if (!tasks || !tasks.length) {
      wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><p>No tasks yet. <a href="/post-task/" style="color:var(--orange)">Post your first task →</a></p></div>`;
      return;
    }

    // Summary totals
    const totalSpent = tasks.reduce((s,t) => s + (t.points_spent||0), 0);
    const totalPaid  = tasks.reduce((s,t) => s + (t.points_paid_out||0), 0);
    const totalDone  = tasks.reduce((s,t) => s + (t.completions_count||0), 0);
    const activeCnt  = tasks.filter(t => t.is_active).length;

    wrap.innerHTML = `
      <!-- SUMMARY STATS -->
      <div class="an-summary">
        <div class="stat-box"><div class="stat-val">${activeCnt}</div><div class="stat-lbl">Active tasks</div></div>
        <div class="stat-box"><div class="stat-val">${totalDone.toLocaleString()}</div><div class="stat-lbl">Total completions</div></div>
        <div class="stat-box"><div class="stat-val">${totalPaid.toLocaleString()}</div><div class="stat-lbl">Points paid out</div></div>
        <div class="stat-box"><div class="stat-val">${(totalSpent - totalPaid).toLocaleString()}</div><div class="stat-lbl">Points remaining</div></div>
      </div>

      <!-- TASK CARDS -->
      <div class="an-tasks" id="an-tasks">
        ${tasks.map((t, i) => buildTaskCard(t, i)).join('')}
      </div>`;

  } catch(e) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${esc(e.message)}</p></div>`;
  }
}

function buildTaskCard(t, i) {
  const pct = parseFloat(t.completion_rate_pct) || 0;
  const slotsLeft = t.max_completions - t.completions_count;
  const expDays = Math.max(0, Math.ceil((new Date(t.expires_at) - Date.now()) / 86400000));
  const statusColor = t.is_active ? 'var(--green)' : 'var(--muted)';
  const cheatLabel = t.avg_cheat_score != null
    ? `${parseFloat(t.avg_cheat_score).toFixed(1)} avg cheat score`
    : 'No completions yet';

  return `
    <div class="an-task-card card-animate" style="--delay:${i*0.05}s">
      <!-- Header -->
      <div class="an-task-header">
        <div style="display:flex;align-items:center;gap:10px;min-width:0">
          <div class="task-plat-icon plat-${t.platform}" style="flex-shrink:0">${PE[t.platform]||'🌐'}</div>
          <div style="min-width:0">
            <div class="an-task-url">${esc(t.target)}</div>
            <div style="font-size:0.78rem;color:var(--muted)">${t.platform} · ${t.type} · ${expDays}d left</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap">
          ${t.is_boosted ? '<span class="boost-badge">⚡ Boosted</span>' : ''}
          <span style="font-size:0.78rem;color:${statusColor};font-weight:700">${t.is_active ? '● Active' : '○ Closed'}</span>
          <button class="btn btn-ghost btn-sm" onclick="openComments('${t.task_id}','${esc(t.target)}')">💬 ${t.comment_count||0}</button>
        </div>
      </div>

      <!-- Progress bar -->
      <div class="an-progress-wrap">
        <div class="an-progress-bar" style="width:${pct}%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:0.78rem;color:var(--muted);margin-bottom:16px">
        <span>${t.completions_count}/${t.max_completions} completions (${pct}%)</span>
        <span>${slotsLeft} slots remaining</span>
      </div>

      <!-- Stat grid -->
      <div class="an-stats">
        <div class="an-stat">
          <div class="an-stat-val">${t.completions_24h||0}</div>
          <div class="an-stat-lbl">Last 24h</div>
        </div>
        <div class="an-stat">
          <div class="an-stat-val">${t.completions_7d||0}</div>
          <div class="an-stat-lbl">Last 7 days</div>
        </div>
        <div class="an-stat">
          <div class="an-stat-val">${t.unique_completers||0}</div>
          <div class="an-stat-lbl">Unique users</div>
        </div>
        <div class="an-stat">
          <div class="an-stat-val">${t.points_paid_out||0}</div>
          <div class="an-stat-lbl">Pts paid out</div>
        </div>
        <div class="an-stat">
          <div class="an-stat-val" style="font-size:0.85rem;color:${parseFloat(t.avg_cheat_score)>30?'var(--red)':'var(--green)'}">
            ${t.avg_cheat_score != null ? parseFloat(t.avg_cheat_score).toFixed(1) : '—'}
          </div>
          <div class="an-stat-lbl">Avg cheat score</div>
        </div>
        <div class="an-stat">
          <div class="an-stat-val">${t.points_reward}</div>
          <div class="an-stat-lbl">Pts per completion</div>
        </div>
      </div>

      ${parseFloat(t.avg_cheat_score) > 30 ? `
        <div class="alert alert-error" style="font-size:0.8rem;margin-top:12px">
          ⚠️ High average cheat score. Some completions may be low-quality or automated.
        </div>` : ''}
    </div>`;
}

// ---- COMMENTS ----
window.openComments = async (taskId, target) => {
  activeCommentTaskId = taskId;
  document.getElementById('cm-title').textContent = 'Comments';
  document.getElementById('cm-sub').textContent = esc(target);
  document.getElementById('cm-err').textContent = '';
  document.getElementById('cm-input').value = '';
  document.getElementById('comments-modal').classList.add('open');
  await loadComments(taskId);
};

async function loadComments(taskId) {
  const feed = document.getElementById('cm-feed');
  feed.innerHTML = '<div class="spinner" style="margin:16px auto"></div>';
  const { data, error } = await supabase
    .from('task_comments')
    .select('*, profiles(username, avatar_color)')
    .eq('task_id', taskId)
    .order('created_at', { ascending: true });

  if (error) { feed.innerHTML = `<p style="color:var(--red)">${esc(error.message)}</p>`; return; }
  if (!data || !data.length) {
    feed.innerHTML = '<p style="color:var(--muted);font-size:0.85rem;text-align:center;padding:16px">No comments yet.</p>';
    return;
  }

  feed.innerHTML = data.map(c => {
    const ini = (c.profiles?.username || '?')[0].toUpperCase();
    const color = c.profiles?.avatar_color || 'var(--orange)';
    return `
      <div class="comment-item ${c.is_owner_note ? 'comment-note' : ''}">
        <div class="comment-avatar" style="background:${color}">${ini}</div>
        <div class="comment-body">
          <div class="comment-meta">
            <strong>@${esc(c.profiles?.username||'unknown')}</strong>
            ${c.is_owner_note ? '<span class="note-badge">📌 Owner note</span>' : ''}
            <span>${new Date(c.created_at).toLocaleDateString()}</span>
          </div>
          <div class="comment-text">${esc(c.content)}</div>
        </div>
        ${c.user_id === profile.id ? `<button class="btn-report" onclick="deleteComment('${c.id}','${taskId}')" title="Delete">✕</button>` : ''}
      </div>`;
  }).join('');
}

window.submitComment = async () => {
  const content = document.getElementById('cm-input').value.trim();
  const isNote = document.getElementById('cm-owner-note').checked;
  const errEl = document.getElementById('cm-err');
  errEl.textContent = '';
  if (!content) { errEl.textContent = 'Please enter a comment.'; return; }
  const { error } = await supabase.from('task_comments').insert({
    task_id: activeCommentTaskId,
    user_id: profile.id,
    content,
    is_owner_note: isNote,
  });
  if (error) { errEl.textContent = error.message; return; }
  document.getElementById('cm-input').value = '';
  await loadComments(activeCommentTaskId);
};

window.deleteComment = async (commentId, taskId) => {
  await supabase.from('task_comments').delete().eq('id', commentId);
  await loadComments(taskId);
};

main();
</script>
</body>
</html>
