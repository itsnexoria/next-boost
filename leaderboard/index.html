<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard — Next Boost</title><meta name="robots" content="noindex"/>
  
  <link rel="preconnect" href="https://slufbzzfofzptwjefzmu.supabase.co"/>
  <link rel="dns-prefetch" href="https://slufbzzfofzptwjefzmu.supabase.co"/>
  <link rel="manifest" href="/manifest.json"/><meta name="theme-color" content="#E8621A"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <link rel="apple-touch-icon" href="/assets/img/logo.png"/>
  <link rel="icon" href="/assets/img/favicon.svg?v=2" type="image/svg+xml"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <link rel="stylesheet" href="/assets/css/app.css"/>
</head>
<body>
<nav class="nav" id="main-nav"></nav>
<div class="app-shell">
  <aside class="app-sidebar" id="app-sidebar"></aside>
  <div class="page-content">
    <h1 class="page-title">Leaderboard</h1>

    <!-- User's own rank card -->
    <div id="my-rank-card" style="display:none">
      <div class="lb-user-card" id="my-card-inner">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- Tab switcher -->
    <div class="lb-tabs">
      <button class="lb-tab active" data-board="all" onclick="showBoard('all',this)">🏆 All-time</button>
      <button class="lb-tab" data-board="weekly" onclick="showBoard('weekly',this)">📅 This week</button>
      <button class="lb-tab" data-board="daily" onclick="showBoard('daily',this)">⚡ Today</button>
    </div>

    <div id="lb-wrap"></div>
  </div>
</div>
<nav class="mobile-nav-bar" id="mobile-nav"></nav>

<!-- User profile modal -->
<div class="modal-overlay" id="user-modal" style="display:none" onclick="if(event.target===this)closeUserModal()">
  <div class="modal" style="max-width:400px;text-align:center" id="user-modal-inner"></div>
</div>

<script type="module">
import { supabase, esc } from '/assets/js/shared.js';
import { initApp } from '/assets/js/app.js';
let profile;
const medals = ['🥇','🥈','🥉'];

async function main() {
  const ctx = await initApp('leaderboard');
  if (!ctx) return;
  profile = ctx.profile;
  await loadBoard('all');
  renderMyCard('all');
}

const VIEW_MAP = {
  all:    { view: 'leaderboard',        ptField: 'points',       label: 'all-time pts' },
  weekly: { view: 'weekly_leaderboard', ptField: 'weekly_points', label: 'pts this week' },
  daily:  { view: 'daily_leaderboard',  ptField: 'daily_points',  label: 'pts today' },
};
let currentBoard = 'all';

async function loadBoard(board) {
  currentBoard = board;
  const wrap = document.getElementById('lb-wrap');
  wrap.innerHTML = '<div class="spinner"></div>';
  const { view, ptField, label } = VIEW_MAP[board];
  try {
    const { data, error } = await supabase.from(view).select('*');
    if (error) throw error;
    if (!data || !data.length) {
      wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">🏆</div><p>No data yet. Start earning!</p></div>';
      return;
    }
    wrap.innerHTML = `
      <div class="lb-table">
        <div class="lb-header">
          <span>Rank</span><span>User</span><span>${label}</span><span class="lb-done">Tasks done</span>
        </div>
        ${data.map(u => buildRow(u, ptField)).join('')}
      </div>`;
  } catch(e) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${esc(e.message)}</p></div>`;
  }
  renderMyCard(board);
}

function buildRow(u, ptField) {
  const isMe = u.id === profile.id;
  const ini = (u.display_name || u.username || '?')[0].toUpperCase();
  const badge = u.top_badge ? `<span title="${esc(u.top_badge_title||u.top_badge)}" style="font-size:1rem;line-height:1">${u.top_badge}</span>` : '';
  const streakBadge = (u.current_streak||0)>=7 ? `<span title="${u.current_streak}-day streak" style="font-size:0.72rem;background:rgba(255,100,0,0.15);color:#ff6400;padding:1px 6px;border-radius:999px;font-weight:700">🔥${u.current_streak}</span>` : '';
  const verifiedBadge = u.is_verified ? `<span title="Verified Creator" style="font-size:0.68rem;background:rgba(96,165,250,0.15);color:#60a5fa;padding:1px 6px;border-radius:999px;font-weight:700">✓ Verified</span>` : '';
  const avatarHtml = u.avatar_url
    ? `<img src="${u.avatar_url}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0" alt="avatar"/>`
    : `<div style="width:30px;height:30px;border-radius:50%;background:${u.avatar_color||'var(--orange)'};display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:700;color:#fff;flex-shrink:0;font-family:'Space Grotesk',sans-serif">${ini}</div>`;
  return `
    <div class="lb-row${isMe ? ' lb-me' : ''}"
         onclick="showUser('${u.id}','${esc(u.display_name||u.username)}','${u.avatar_color||'var(--orange)'}',${u[ptField]||0},${u.tasks_completed||0},'${esc(u.username)}','${u.top_badge||''}','${esc(u.top_badge_title||'')}',${u.current_streak||0},${u.achievements_count||0},'${u.avatar_url||''}',${u.followers_count||0},${u.is_verified?'true':'false'},${u.trust_score||0})""
         style="cursor:pointer">
      <span class="lb-rank">${medals[u.rank-1] || '#'+u.rank}</span>
      <span class="lb-user">
        ${avatarHtml}
        <div style="display:flex;flex-direction:column;min-width:0">
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(u.display_name||u.username)}${isMe ? ' <span class="lb-you">you</span>' : ''}</span>
          <span style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-top:2px">${badge}${streakBadge}${verifiedBadge}</span>
        </div>
      </span>
      <span class="lb-pts">⚡ ${(u[ptField]||0).toLocaleString()}</span>
      <span class="lb-done" style="color:var(--muted)">${u.tasks_completed||0}</span>
    </div>`;
}

async function renderMyCard(board) {
  const { view, ptField, label } = VIEW_MAP[board];
  const { data } = await supabase.from(view).select('*').eq('id', profile.id).single();
  const card = document.getElementById('my-rank-card');
  const inner = document.getElementById('my-card-inner');
  if (!data) { card.style.display = 'none'; return; }
  const ini = (profile.display_name || profile.username || '?')[0].toUpperCase();
  inner.innerHTML = `
    <div class="lb-user-card-rank">${medals[data.rank-1] || '#'+data.rank}</div>
    <div style="width:44px;height:44px;border-radius:50%;background:${profile.avatar_color||'var(--orange)'};display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:#fff;flex-shrink:0;font-family:'Space Grotesk',sans-serif">${ini}</div>
    <div class="lb-user-card-info">
      <div class="lb-user-card-name">${esc(profile.display_name||profile.username)}</div>
      <div class="lb-user-card-sub">Your ranking · ${label}</div>
    </div>
    <div class="lb-user-card-stats">
      <div class="lb-user-card-stat"><div class="val">⚡ ${(data[ptField]||0).toLocaleString()}</div><div class="lbl">${label}</div></div>
      <div class="lb-user-card-stat"><div class="val">${data.tasks_completed||0}</div><div class="lbl">Tasks done</div></div>
      <div class="lb-user-card-stat"><div class="val">#${data.rank}</div><div class="lbl">Rank</div></div>
    </div>`;
  card.style.display = 'block';
}

window.showBoard = (board, btn) => {
  document.querySelectorAll('.lb-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadBoard(board);
};

window.showUser = (id, name, color, points, done, username, topBadge, topBadgeTitle, streak, achCount, avatarUrl, followersCount, isVerified, trustScore) => {
  const modal = document.getElementById('user-modal');
  const inner = document.getElementById('user-modal-inner');
  const ini = name[0].toUpperCase();
  const isMe = id === profile.id;
  const badgeHtml = topBadge ? `<div style="font-size:2rem;margin-bottom:4px">${topBadge}</div><div style="font-size:0.78rem;color:var(--muted);margin-bottom:12px">${esc(topBadgeTitle||'Badge')}</div>` : '';
  const verifiedModalHtml = isVerified ? `<span style="display:inline-flex;align-items:center;gap:4px;font-size:0.75rem;color:#60a5fa;background:rgba(96,165,250,0.12);border:1px solid rgba(96,165,250,0.25);border-radius:999px;padding:2px 10px;font-weight:700;margin-bottom:8px">✓ Verified Creator</span><br>` : '';
  const trustScore_ = trustScore || 0;
  const trustColor_ = trustScore_ >= 80 ? '#4ade80' : trustScore_ >= 50 ? '#f59e0b' : '#94a3b8';
  const trustModalHtml = trustScore_ > 0 ? `<div style="display:inline-flex;align-items:center;gap:5px;font-size:0.75rem;color:${trustColor_};background:${trustColor_}1a;border:1px solid ${trustColor_}33;border-radius:999px;padding:2px 10px;font-weight:600;margin-bottom:12px">🛡 Trust Score: ${trustScore_}/100</div>` : '';
  const streakHtml = streak>=3 ? `<div class="stat-box"><div class="stat-val">&#x1F525;${streak}</div><div class="stat-lbl">Streak</div></div>` : '';
  const achHtml = achCount>0 ? `<div class="stat-box"><div class="stat-val">&#x1F396;${achCount}</div><div class="stat-lbl">Achievements</div></div>` : '';
  const followersHtml = `<div class="stat-box"><div class="stat-val">${followersCount||0}</div><div class="stat-lbl">Followers</div></div>`;
  const avatarInner = avatarUrl
    ? `<img src="${avatarUrl}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;margin:0 auto 14px;display:block" alt="avatar"/>`
    : `<div style="width:80px;height:80px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:#fff;margin:0 auto 14px;font-family:'Space Grotesk',sans-serif">${ini}</div>`;
  inner.innerHTML = `
    ${avatarInner}
    ${badgeHtml}
    <div style="font-size:1.3rem;font-weight:700;font-family:'Space Grotesk',sans-serif">${esc(name)}</div>
    <div style="color:var(--muted);font-size:0.85rem;margin-bottom:8px">@${esc(username)}</div>
    ${verifiedModalHtml}${trustModalHtml}
    <div class="stat-grid" style="justify-content:center;margin-bottom:16px">
      <div class="stat-box"><div class="stat-val">${points.toLocaleString()}</div><div class="stat-lbl">Points</div></div>
      <div class="stat-box"><div class="stat-val">${done}</div><div class="stat-lbl">Done</div></div>
      ${followersHtml}${streakHtml}${achHtml}
    </div>
    ${!isMe ? `
    <button class="btn btn-primary btn-full" id="follow-btn-modal" onclick="toggleFollow('${id}',this)" style="margin-bottom:8px">+ Follow</button>
    <div id="mutual-promise-wrap" style="display:none;margin-bottom:8px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.82rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 12px">
        <input type="checkbox" id="mutual-promise-check" onchange="toggleMutualPromise('${id}',this)" style="accent-color:var(--orange);width:15px;height:15px;flex-shrink:0"/>
        <span>🤝 <strong style="color:var(--text)">Promise mutual follow-back</strong> — I'll follow them back if they follow me</span>
      </label>
    </div>
    <div id="mutual-status" style="font-size:0.78rem;color:var(--muted);margin-bottom:8px;min-height:18px;text-align:center"></div>` : ''}
    <button class="btn btn-ghost btn-full" onclick="closeUserModal()">Close</button>`;
  modal.style.display = 'flex';
  modal.classList.add('open');
  if (!isMe) loadFollowState(id);
};

async function loadFollowState(userId) {
  const btn = document.getElementById('follow-btn-modal');
  if (!btn) return;
  const { data } = await supabase.rpc('get_follow_stats', { p_user_id: userId });
  if (!data) return;
  const isFollowing = data.is_following;
  btn.textContent = isFollowing ? '✓ Following' : '+ Follow';
  btn.style.background = isFollowing ? 'var(--surface2)' : '';
  // Show mutual promise wrap
  const promiseWrap = document.getElementById('mutual-promise-wrap');
  const mutualStatus = document.getElementById('mutual-status');
  if (promiseWrap) {
    promiseWrap.style.display = 'block';
    // Check if there's an existing mutual promise
    const { data: mp } = await supabase.from('mutual_promises')
      .select('*').eq('from_user', profile.id).eq('to_user', userId).maybeSingle();
    if (mp) {
      document.getElementById('mutual-promise-check').checked = true;
      if (mutualStatus) mutualStatus.textContent = '✅ Mutual promise active — both will follow back';
    } else {
      // Check if they promised to follow us
      const { data: theirPromise } = await supabase.from('mutual_promises')
        .select('*').eq('from_user', userId).eq('to_user', profile.id).maybeSingle();
      if (theirPromise && mutualStatus) {
        mutualStatus.textContent = '🤝 This user has a mutual promise waiting for you!';
        mutualStatus.style.color = 'var(--orange)';
      }
    }
  }
}

window.toggleFollow = async (userId, btn) => {
  const isFollowing = btn.textContent.includes('Following');
  btn.disabled = true; btn.textContent = '…';
  if (isFollowing) {
    await supabase.rpc('unfollow_user', { p_target_id: userId });
    btn.textContent = '+ Follow'; btn.style.background = '';
  } else {
    await supabase.rpc('follow_user', { p_target_id: userId });
    btn.textContent = '✓ Following'; btn.style.background = 'var(--surface2)';
    // Check if they have a mutual promise on us
    const { data: theirPromise } = await supabase.from('mutual_promises')
      .select('*').eq('from_user', userId).eq('to_user', profile.id).maybeSingle();
    const mutualStatus = document.getElementById('mutual-status');
    if (theirPromise && mutualStatus) {
      mutualStatus.textContent = '✅ They promised to follow back — check their profile!';
      mutualStatus.style.color = 'var(--green)';
    }
  }
  btn.disabled = false;
};

window.toggleMutualPromise = async (userId, checkbox) => {
  const mutualStatus = document.getElementById('mutual-status');
  if (checkbox.checked) {
    const { error } = await supabase.from('mutual_promises').upsert(
      { from_user: profile.id, to_user: userId }, { onConflict: 'from_user,to_user' }
    );
    if (error) {
      checkbox.checked = false;
      if (mutualStatus) mutualStatus.textContent = 'Could not save promise: ' + error.message;
      return;
    }
    if (mutualStatus) { mutualStatus.textContent = '✅ Mutual promise set — you\'ll follow them back!'; mutualStatus.style.color = 'var(--green)'; }
  } else {
    await supabase.from('mutual_promises').delete().eq('from_user', profile.id).eq('to_user', userId);
    if (mutualStatus) { mutualStatus.textContent = ''; }
  }
};

window.closeUserModal = () => {
  const modal = document.getElementById('user-modal');
  modal.style.display = 'none';
  modal.classList.remove('open');
};

main();
</script>
</body>
</html>
