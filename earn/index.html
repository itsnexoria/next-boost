<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Earn Points — Next Boost</title><meta name="robots" content="noindex"/>
  
  <link rel="preconnect" href="https://slufbzzfofzptwjefzmu.supabase.co"/>
  <link rel="dns-prefetch" href="https://slufbzzfofzptwjefzmu.supabase.co"/>
  <link rel="manifest" href="/manifest.json"/><meta name="theme-color" content="#E8621A"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <link rel="apple-touch-icon" href="/assets/img/logo.png"/>
  <link rel="icon" href="/assets/img/favicon.svg?v=2" type="image/svg+xml"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <link rel="stylesheet" href="/assets/css/app.css"/>
</head>
<body>
<nav class="nav" id="main-nav"></nav>
<div class="app-shell">
  <aside class="app-sidebar" id="app-sidebar"></aside>
  <div class="page-content">
<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:6px">
  <div><h1 class="page-title">Earn Points</h1><p class="page-sub">Complete tasks to earn points after the 30s timer.</p></div>
</div>

<!-- Feed tabs -->
<div style="display:flex;gap:4px;margin-bottom:16px;background:var(--surface2);border-radius:var(--radius);padding:4px;width:fit-content">
  <button id="tab-all" onclick="switchFeedTab('all')" class="btn btn-primary btn-sm" style="border-radius:calc(var(--radius) - 4px)">🌐 All tasks</button>
  <button id="tab-following" onclick="switchFeedTab('following')" class="btn btn-ghost btn-sm" style="border-radius:calc(var(--radius) - 4px)">👥 Following</button>
</div>

<div class="filter-dropdowns" id="filter-bar">
  <select class="filter-select" id="filter-platform" onchange="applyFilters()">
    <option value="all">All Platforms</option>
    <option value="tiktok">🎵 TikTok</option>
    <option value="instagram">📸 Instagram</option>
    <option value="youtube">▶️ YouTube</option>
    <option value="discord">💬 Discord</option>
    <option value="twitch">🟣 Twitch</option>
    <option value="twitter">🐦 Twitter / X</option>
    <option value="website">🌐 Website</option>
  </select>
  <select class="filter-select" id="filter-type" onchange="applyFilters()">
    <option value="all">All Types</option>
    <option value="follow">Follow</option>
    <option value="like">Like</option>
    <option value="view">View</option>
    <option value="join">Join</option>
    <option value="website">Visit</option>
  </select>
  <select class="filter-select" id="filter-sort" onchange="applyFilters()">
    <option value="newest">Newest first</option>
    <option value="points_high">Highest reward</option>
    <option value="points_low">Lowest reward</option>
    <option value="slots">Most slots left</option>
  </select>
</div>
<!-- Bonus event banner -->
<div id="bonus-banner" style="display:none;background:linear-gradient(135deg,var(--orange),var(--orange-lt));border-radius:var(--radius);padding:14px 18px;margin-bottom:16px;align-items:center;gap:12px">
  <div style="font-size:1.8rem">🎉</div>
  <div style="flex:1"><div style="font-weight:700;font-size:0.95rem;color:#fff" id="bonus-name"></div><div style="font-size:0.8rem;color:rgba(255,255,255,0.85)" id="bonus-desc"></div></div>
  <div style="text-align:right;flex-shrink:0"><div style="font-size:1.5rem;font-weight:900;color:#fff" id="bonus-mult"></div><div style="font-size:0.72rem;color:rgba(255,255,255,0.8)" id="bonus-ends"></div></div>
</div>
<div id="earn-feed" class="task-feed"><div class="spinner"></div></div>
<div class="load-more-row" id="load-more" style="display:none">
  <button class="btn btn-ghost" onclick="loadMore()">Load more tasks</button>
</div></div>
</div>
<nav class="mobile-nav-bar" id="mobile-nav"></nav>
<script type="module">
import { supabase, esc } from '/assets/js/shared.js';
import { initApp, updateNavPoints, checkOnboarding, initTaskModal } from '/assets/js/app.js';
const PE={tiktok:'🎵',instagram:'📸',youtube:'▶️',discord:'💬',website:'🌐',twitch:'🟣',twitter:'🐦'};
const PC={tiktok:'plat-tiktok',instagram:'plat-instagram',youtube:'plat-youtube',discord:'plat-discord',website:'plat-website',twitch:'plat-twitch',twitter:'plat-twitter'};
const TL={follow:'Follow',like:'Like',view:'View',join:'Join',website:'Visit',twitch:'Follow',retweet:'Retweet'};
const PAGE=15;
let profile,offset=0,filterPlat='all',filterType='all',filterSort='newest',myStatus={},allLoaded=[];

async function main(){
  const ctx=await initApp('earn');
  if(!ctx) return;
  profile=ctx.profile;
  checkOnboarding(profile);
  initTaskModal(onComplete);
  checkBonusEvent();
  await load(true);
}

async function checkBonusEvent(){
  const { data } = await supabase.rpc('get_active_bonus');
  if (!data) return;
  const banner = document.getElementById('bonus-banner');
  if (!banner) return;
  banner.style.display = 'flex';
  document.getElementById('bonus-name').textContent = data.name;
  document.getElementById('bonus-desc').textContent = data.description || '';
  document.getElementById('bonus-mult').textContent = `${data.multiplier}x pts`;
  const ends = new Date(data.ends_at);
  const diff = Math.ceil((ends - Date.now()) / 3600000);
  document.getElementById('bonus-ends').textContent = diff > 24
    ? `Ends in ${Math.ceil(diff/24)}d`
    : `Ends in ${diff}h`;
}

async function load(reset=true){
  if(reset){offset=0;allLoaded=[];document.getElementById('earn-feed').innerHTML='<div class="spinner"></div>';}
  try{
    const {data:tasks,error}=await supabase.from('tasks').select('*, owner:profiles!owner_id(username,display_name,trust_score,is_verified)')
      .eq('is_active',true).neq('owner_id',profile.id)
      .order('is_boosted',{ascending:false}).order('created_at',{ascending:false})
      .range(offset,offset+PAGE-1);
    if(error) throw error;
    // Flatten owner fields
    (tasks||[]).forEach(t=>{t.owner_username=t.owner?.username;t.owner_display_name=t.owner?.display_name;t.owner_trust_score=t.owner?.trust_score||0;t.owner_is_verified=t.owner?.is_verified||false;});
    if(reset){
      const {data:myC}=await supabase.from('completions').select('task_id,status').eq('user_id',profile.id);
      myStatus=Object.fromEntries((myC||[]).map(c=>[c.task_id,c.status]));
    }
    const newT=tasks||[];
    allLoaded=[...allLoaded,...newT];
    offset+=newT.length;
    document.getElementById('load-more').style.display=newT.length===PAGE?'flex':'none';
    render(reset);
  }catch(e){
    document.getElementById('earn-feed').innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><p>${esc(e.message)}</p></div>`;
  }
}

function render(reset=true){
  const feed=document.getElementById('earn-feed');
  let filtered=allLoaded.filter(t=>myStatus[t.id]!=='approved');
  if(filterPlat!=='all') filtered=filtered.filter(t=>t.platform===filterPlat);
  if(filterType!=='all') filtered=filtered.filter(t=>t.type===filterType);
  if(filterSort==='points_high') filtered.sort((a,b)=>b.points_reward-a.points_reward);
  else if(filterSort==='points_low') filtered.sort((a,b)=>a.points_reward-b.points_reward);
  else if(filterSort==='slots') filtered.sort((a,b)=>(b.max_completions-b.completions_count)-(a.max_completions-a.completions_count));
  if(reset) feed.innerHTML='';
  if(!filtered.length&&reset){feed.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><p>No tasks to complete right now.<br><span style="font-size:0.82rem;color:var(--muted)">Your own tasks don\'t appear here. Invite others to see tasks!</span><br><br><a href="/post-task/" style="color:var(--orange)">Post a task →</a></p></div>';return;}
  const slice=reset?filtered:filtered.slice(Math.max(0,filtered.length-PAGE));
  slice.forEach((t,i)=>{
    if(reset&&feed.querySelector(`[data-id="${t.id}"]`)) return;
    const sl=t.max_completions-t.completions_count;
    const exp=Math.max(0,Math.ceil((new Date(t.expires_at)-Date.now())/86400000));
    const st=myStatus[t.id];
    let action='';
    if(st==='submitted'||st==='pending') action=`<button class="btn btn-primary btn-sm" onclick="window.openTaskModal('${t.id}')">Resume ↗</button>`;
    else if(sl<=0) action='<span class="status-chip chip-full">Full</span>';
    else action=`<button class="btn btn-primary btn-sm" onclick="window.openTaskModal('${t.id}')">Start ↗</button>`;
    const card=document.createElement('div');
    card.className='task-card card-animate'; card.dataset.id=t.id;
    card.style.setProperty('--delay',`${i*0.04}s`);
    const trustScore = t.owner_trust_score || 0;
    const trustColor = trustScore >= 80 ? '#4ade80' : trustScore >= 50 ? '#f59e0b' : '#94a3b8';
    const trustLabel = trustScore >= 80 ? 'High trust' : trustScore >= 50 ? 'Good' : trustScore > 0 ? 'New' : '';
    const trustHtml = trustScore > 0 ? `<span style="display:inline-flex;align-items:center;gap:3px;font-size:0.7rem;color:${trustColor};background:${trustColor}1a;border:1px solid ${trustColor}33;border-radius:999px;padding:1px 6px;font-weight:600" title="Creator Trust Score">🛡 ${trustScore} ${trustLabel}</span>` : '';
    const verifiedHtml = t.owner_is_verified ? `<span style="font-size:0.72rem;color:#60a5fa;background:#60a5fa1a;border:1px solid #60a5fa33;border-radius:999px;padding:1px 6px;font-weight:600" title="Verified Creator">✓ Verified</span>` : '';
    card.innerHTML=`
      <div class="task-plat-icon ${PC[t.platform]||'plat-website'}"></div>
      <div class="task-info">
        <h4>${esc(prettyTarget(t.target, t.platform))}${t.is_boosted?' <span class="boost-badge">⚡ Boosted</span>':''}</h4>
        <p>${esc(TL[t.type]||t.type)} · by <span style="color:var(--text)">${esc(t.owner_display_name||t.owner_username||'Unknown')}</span>${verifiedHtml?` ${verifiedHtml}`:''} · <span class="expiry-label">${exp}d left</span></p>
        ${trustHtml ? `<div style="margin-top:5px">${trustHtml}</div>` : ''}
      </div>
      <div class="task-actions">
        <span class="type-badge type-${t.type}">${TL[t.type]}</span>
        <span class="pts-badge">+${t.points_reward} pts</span>
        <span class="slots-badge">${sl}/${t.max_completions}</span>
        ${action}
        <button class="btn-report" title="Report" onclick="window.openReport('${t.id}')">⚑</button>
      </div>`;
    feed.appendChild(card);
  });
}

// Pretty-print a task target URL into a human-readable handle
const PLAT_NAMES = { tiktok:'TikTok', instagram:'Instagram', youtube:'YouTube', twitter:'Twitter/X', twitch:'Twitch', discord:'Discord', website:'Website' };
function prettyHandle(url, platform) {
  try {
    const u = new URL(url);
    const parts = u.pathname.replace(/\/+$/, '').split('/').filter(Boolean);
    switch (platform) {
      case 'tiktok':     return parts.find(p => p.startsWith('@')) || parts[parts.length-1] || url;
      case 'instagram':  return (parts[0]==='p'||parts[0]==='reel') ? 'post/'+parts[1] : '@'+(parts[0]||url);
      case 'youtube':    return u.searchParams.get('v') ? u.searchParams.get('v') : (parts.find(p=>p.startsWith('@'))||parts[parts.length-1]||url);
      case 'twitter':    return parts[1]==='status' ? '@'+parts[0] : '@'+(parts[0]||url);
      case 'twitch':     return parts[0] || url;
      case 'discord':    return 'discord.gg/'+(parts[parts.length-1]||'');
      case 'website':    return u.hostname.replace(/^www\./,'');
      default:           return u.hostname.replace(/^www\./,'');
    }
  } catch { return url; }
}
function prettyTarget(url, platform) {
  const name = PLAT_NAMES[platform] || platform;
  const handle = prettyHandle(url, platform);
  return `${name} — ${handle}`;
}
let currentFeedTab = 'all';

window.switchFeedTab = async (tab) => {
  currentFeedTab = tab;
  document.getElementById('tab-all').className = tab==='all' ? 'btn btn-primary btn-sm' : 'btn btn-ghost btn-sm';
  document.getElementById('tab-following').className = tab==='following' ? 'btn btn-primary btn-sm' : 'btn btn-ghost btn-sm';
  document.getElementById('filter-bar').style.display = tab==='all' ? '' : 'none';

  if (tab === 'following') {
    const feed = document.getElementById('earn-feed');
    feed.innerHTML = '<div class="spinner"></div>';
    const { data, error } = await supabase.rpc('get_following_tasks', { p_limit: 50 });
    if (error) { feed.innerHTML = `<div class="empty-state"><p>${error.message}</p></div>`; return; }
    if (!data || !data.length) {
      feed.innerHTML = `<div class="empty-state"><div class="empty-icon">👥</div><p>No tasks from people you follow yet.<br/><span style="font-size:0.82rem;color:var(--muted)">Follow creators on the <a href="/leaderboard/" style="color:var(--orange)">leaderboard</a> to see their tasks here.</span></p></div>`;
      return;
    }
    feed.innerHTML = '';
    data.forEach(t => {
      const card = document.createElement('div');
      card.className = 'task-card';
      const platLabel = (PLAT_NAMES[t.platform]||t.platform) + ' — ' + prettyHandle(t.target, t.platform);
      card.innerHTML = `
        <div class="task-plat-icon ${PC[t.platform]||'plat-website'}"></div>
        <div class="task-info">
          <h4>${esc(platLabel)}</h4>
          <p>${esc(TL[t.type]||t.type)} · by <span style="color:var(--text)">${esc(t.owner_display_name||t.owner_username||'Unknown')}</span></p>
        </div>
        <div class="task-actions">
          <span class="type-badge">${esc(TL[t.type]||t.type)}</span>
          <span class="pts-badge">+${t.points_reward} pts</span>
          <button class="btn btn-primary btn-sm" onclick="window.openTask('${t.task_id}')">Start ↗</button>
        </div>`;
      feed.appendChild(card);
    });
  } else {
    await load(true);
  }
};

window.applyFilters=()=>{
  const plat=document.getElementById('filter-platform').value;
  const type=document.getElementById('filter-type').value;
  const sort=document.getElementById('filter-sort').value;
  filterPlat=plat; filterType=type; filterSort=sort;
  render(true);
};
window.loadMore=()=>load(false);

function onComplete(pts){
  supabase.from('profiles').select('points').eq('id',profile.id).single().then(({data})=>{
    if(data){profile.points=data.points;updateNavPoints(data.points);}
  });
  load(true);
}

window.openEarnComments = async (taskId, target) => {
  window._earnCommentTaskId = taskId;
  document.getElementById('ecm-title').textContent = 'Comments';
  document.getElementById('ecm-sub').textContent = target;
  document.getElementById('ecm-err').textContent = '';
  document.getElementById('earn-comments-modal').classList.add('open');
  const feed = document.getElementById('ecm-feed');
  feed.innerHTML = '<div class="spinner" style="margin:12px auto"></div>';
  const { data } = await supabase.from('task_comments').select('*, profiles(username,avatar_color)')
    .eq('task_id', taskId).order('created_at', { ascending: true });
  if (!data || !data.length) { feed.innerHTML = '<p style="color:var(--muted);font-size:0.83rem;text-align:center;padding:12px">No comments yet.</p>'; return; }
  feed.innerHTML = data.map(cm => {
    const ini = (cm.profiles?.username||'?')[0].toUpperCase();
    const bg = cm.profiles?.avatar_color || 'var(--orange)';
    return `<div style="display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="width:26px;height:26px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;color:#fff;flex-shrink:0">${ini}</div>
      <div>
        <div style="font-size:0.78rem;color:var(--muted);margin-bottom:2px"><strong style="color:var(--text)">@${esc(cm.profiles?.username||'?')}</strong> ${cm.is_owner_note?'<span style="color:var(--orange);font-size:0.7rem">📌 Owner note</span>':''}</div>
        <div style="font-size:0.85rem">${esc(cm.content)}</div>
      </div>
    </div>`;
  }).join('');
};

window.submitEarnComment = async () => {
  const content = document.getElementById('ecm-input').value.trim();
  const errEl = document.getElementById('ecm-err');
  if (!content) { errEl.textContent = 'Please enter a comment.'; return; }
  const { error } = await supabase.from('task_comments').insert({
    task_id: window._earnCommentTaskId, user_id: profile.id, content, is_owner_note: false
  });
  if (error) { errEl.textContent = error.message; return; }
  document.getElementById('ecm-input').value = '';
  window.openEarnComments(window._earnCommentTaskId, document.getElementById('ecm-sub').textContent);
};

main();
</script>
<!-- Comments modal -->
<div class="modal-overlay" id="earn-comments-modal">
  <div class="modal" style="max-width:500px">
    <h2 id="ecm-title">Comments</h2>
    <p class="modal-sub" id="ecm-sub" style="word-break:break-all"></p>
    <div id="ecm-feed" style="max-height:280px;overflow-y:auto;margin-bottom:14px"></div>
    <div class="form-group">
      <textarea id="ecm-input" placeholder="Ask the task owner a question…" maxlength="500" rows="2"></textarea>
    </div>
    <div class="error-msg" id="ecm-err"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('earn-comments-modal').classList.remove('open')">Close</button>
      <button class="btn btn-primary" onclick="submitEarnComment()">Post</button>
    </div>
  </div>
</div>
</body></html>
