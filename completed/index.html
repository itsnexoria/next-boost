<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Completed Tasks — Next Boost</title><meta name="robots" content="noindex"/>
  
  <link rel="preconnect" href="https://slufbzzfofzptwjefzmu.supabase.co"/>
  <link rel="dns-prefetch" href="https://slufbzzfofzptwjefzmu.supabase.co"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Next Boost"/>
  <link rel="apple-touch-icon" href="/assets/img/logo.png"/><meta name="theme-color" content="#E8621A"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Next Boost"/>
  <link rel="apple-touch-icon" href="/assets/img/logo.png"/>
  <link rel="icon" href="/assets/img/favicon.svg?v=2" type="image/svg+xml"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <link rel="stylesheet" href="/assets/css/app.css"/>
</head>
<body>
<nav class="nav" id="main-nav"></nav>
<div class="app-shell">
  <aside class="app-sidebar" id="app-sidebar"></aside>
  <div class="page-content">
    <h1 class="page-title">Completed Tasks</h1>
    <p class="page-sub">Tasks you've successfully earned points for.</p>
    <div id="completed-feed" class="task-feed"><div class="spinner"></div></div>
  </div>
</div>
<nav class="mobile-nav-bar" id="mobile-nav"></nav>
<script type="module">
  import { supabase, esc } from '/assets/js/shared.js';
  import { initApp } from '/assets/js/app.js';
  const PE={tiktok:'🎵',instagram:'📸',youtube:'▶️',discord:'💬',website:'🌐',twitch:'🟣',twitter:'🐦'};
  const PC={tiktok:'plat-tiktok',instagram:'plat-instagram',youtube:'plat-youtube',discord:'plat-discord',twitch:'plat-twitch',twitter:'plat-twitter'};
  const TL={follow:'Follow',like:'Like',view:'View',join:'Join',website:'Visit',twitch:'Follow',retweet:'Retweet'};
  const PLAT_NAMES = { tiktok:'TikTok', instagram:'Instagram', youtube:'YouTube', twitter:'Twitter/X', twitch:'Twitch', discord:'Discord', website:'Website' };
function prettyHandle(url, platform) {
  try {
    const u = new URL(url);
    const parts = u.pathname.replace(/\/+$/, '').split('/').filter(Boolean);
    if(platform==='tiktok')    return parts.find(p => p.startsWith('@')) || parts[parts.length-1] || url;
    if(platform==='instagram') return (parts[0]==='p'||parts[0]==='reel') ? 'post' : '@'+(parts[0]||url);
    if(platform==='youtube')   return u.searchParams.get('v') || parts.find(p=>p.startsWith('@')) || parts[parts.length-1] || url;
    if(platform==='twitter')   return '@'+(parts[0]||url);
    if(platform==='twitch')    return parts[0] || url;
    if(platform==='discord')   return 'discord.gg/'+(parts[parts.length-1]||'');
    return u.hostname.replace(/^www\./, '');
  } catch(e) { return url; }
}
function prettyTarget(url, platform) {
  return (PLAT_NAMES[platform] || platform) + ' — ' + prettyHandle(url, platform);
}

  async function main() {
    const ctx = await initApp('completed');
    if (!ctx) return;
    const feed = document.getElementById('completed-feed');
    try {
      const { data: completions, error } = await supabase
        .from('completions').select('task_id,reviewed_at')
        .eq('user_id', ctx.profile.id).eq('status','approved')
        .order('reviewed_at', { ascending: false });
      if (error) throw error;
      if (!completions || !completions.length) {
        feed.innerHTML = '<div class="empty-state"><div class="empty-icon">🏅</div><p>No completed tasks yet. <a href="/earn/" style="color:var(--orange)">Start earning →</a></p></div>';
        return;
      }
      const taskIds = completions.map(c => c.task_id);
      const { data: tasks } = await supabase.from('tasks').select('*').in('id', taskIds);
      const taskMap = Object.fromEntries((tasks||[]).map(t => [t.id, t]));
      feed.innerHTML = '';
      completions.forEach((c, i) => {
        const t = taskMap[c.task_id];
        if (!t) return;
        const card = document.createElement('div');
        card.className = 'task-card card-animate';
        card.style.setProperty('--delay', `${i * 0.04}s`);
        card.innerHTML = `
          <div class="task-plat-icon ${PC[t.platform]||'plat-website'}"></div>
          <div class="task-info">
            <h4>${esc(prettyTarget(t.target, t.platform))}</h4>
            <p>${esc(t.description || TL[t.type] + ' on ' + t.platform)}</p>
          </div>
          <div class="task-actions">
            <span class="type-badge type-${t.type}">${TL[t.type]}</span>
            <span class="status-chip chip-approved">✓ +${t.points_reward} pts</span>
          </div>`;
        feed.appendChild(card);
      });
    } catch(e) {
      feed.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${esc(e.message)}</p></div>`;
    }
  }
  main();
</script>
</body>
</html>
