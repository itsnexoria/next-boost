<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Profile — Next Boost</title>
  <meta name="robots" content="index, follow"/>
  <link rel="manifest" href="/manifest.json"/><meta name="theme-color" content="#E8621A"/>
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <link rel="stylesheet" href="/assets/css/app.css"/>
  <style>
    .pub-profile { max-width: 700px; margin: 0 auto; padding: 40px 20px 80px; }
    .pub-header { display: flex; align-items: flex-start; gap: 24px; margin-bottom: 32px; flex-wrap: wrap; }
    .pub-avatar { width: 88px; height: 88px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 700; color: #fff; font-family: 'Space Grotesk', sans-serif; flex-shrink: 0; }
    .pub-name { font-size: 1.6rem; font-weight: 700; font-family: 'Space Grotesk', sans-serif; margin-bottom: 4px; }
    .pub-username { color: var(--muted); font-size: 0.9rem; margin-bottom: 10px; }
    .pub-bio { font-size: 0.9rem; color: var(--muted); line-height: 1.65; max-width: 420px; margin-bottom: 14px; }
    .pub-badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .pub-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 0.78rem; color: var(--muted); }
    .pub-badge.gold { border-color: var(--amber); color: var(--amber); }
    .section-title { font-size: 1rem; font-weight: 700; margin-bottom: 16px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-family: 'Space Grotesk', sans-serif; }
    .ach-mini { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
    .ach-mini-chip { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 0.82rem; display: flex; align-items: center; gap: 6px; }
    .private-notice { text-align: center; padding: 60px 20px; }
    .private-notice .lock { font-size: 3rem; margin-bottom: 16px; }
  </style>
</head>
<body>
  <!-- Public nav (no auth required) -->
  <nav class="nav">
    <a class="nav-logo" href="/"><img src="/assets/img/logo.png" alt="Next Boost" style="height:36px"/></a>
    <div class="nav-links">
      <a href="/login/" class="btn btn-ghost btn-sm">Log in</a>
      <a href="/signup/" class="btn btn-primary btn-sm">Sign up free</a>
    </div>
  </nav>

  <div id="content">
    <div style="display:flex;align-items:center;justify-content:center;min-height:60vh">
      <div class="spinner"></div>
    </div>
  </div>

  <script type="module">
    import { supabase, esc } from '/assets/js/shared.js';

    const PLAT_EMOJI = { tiktok:'🎵', instagram:'📸', youtube:'▶️', discord:'💬', website:'🌐', twitch:'🟣' };
    const TYPE_LABEL = { follow:'Follow', like:'Like', view:'View', join:'Join', website:'Visit' };

    // Get username from URL: /u/?u=username or /u/username (via 404 redirect)
    const params = new URLSearchParams(window.location.search);
    const username = params.get('u') || window.location.pathname.split('/u/')[1]?.replace(/\/$/, '');

    if (!username) {
      document.getElementById('content').innerHTML = `
        <div class="private-notice"><div class="lock">🔍</div>
          <h2>No username specified</h2>
          <p style="color:var(--muted)">Try /u/?u=username</p>
        </div>`;
    } else {
      await loadProfile(username);
    }

    // Update nav if logged in
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      document.querySelector('.nav-links').innerHTML = `
        <a href="/earn/" class="btn btn-ghost btn-sm">Dashboard</a>`;
    }

    async function loadProfile(uname) {
      const { data, error } = await supabase.rpc('get_user_profile', { p_username: uname });
      const el = document.getElementById('content');

      if (error || !data) {
        el.innerHTML = `<div class="private-notice"><div class="lock">👤</div>
          <h2>User not found</h2><p style="color:var(--muted)">@${esc(uname)} doesn't exist.</p>
          <a href="/" class="btn btn-ghost" style="margin-top:20px">Go home</a></div>`;
        return;
      }

      // Update page title and meta
      document.title = `${data.display_name} (@${data.username}) — Next Boost`;
      const metaDesc = document.createElement('meta');
      metaDesc.name = 'description';
      metaDesc.content = data.bio || `${data.display_name} on Next Boost — ${data.tasks_completed} tasks completed`;
      document.head.appendChild(metaDesc);

      if (!data.profile_public) {
        el.innerHTML = `<div class="private-notice"><div class="lock">🔒</div>
          <h2>Private profile</h2>
          <p style="color:var(--muted)">@${esc(data.username)} has set their profile to private.</p>
          <a href="/" class="btn btn-ghost" style="margin-top:20px">Go home</a></div>`;
        return;
      }

      const ini = (data.display_name || data.username || '?')[0].toUpperCase();
      const repColor = data.reputation >= 50 ? 'var(--green)' : data.reputation >= 0 ? 'var(--amber)' : 'var(--red)';
      const memberSince = new Date(data.created_at).toLocaleDateString('en-US', { year:'numeric', month:'long' });

      el.innerHTML = `<div class="pub-profile">
        <div class="pub-header">
          <div class="pub-avatar" style="background:${data.avatar_color||'#E8621A'}">${ini}</div>
          <div style="flex:1;min-width:0">
            <div class="pub-name">${esc(data.display_name||data.username)}</div>
            <div class="pub-username">@${esc(data.username)} · Member since ${memberSince}</div>
            ${data.bio ? `<div class="pub-bio">${esc(data.bio)}</div>` : ''}
            <div class="pub-badges">
              ${data.rank ? `<span class="pub-badge gold">🏆 Rank #${data.rank}</span>` : ''}
              ${data.streak >= 7 ? `<span class="pub-badge gold">🔥 ${data.streak} day streak</span>` : ''}
              <span class="pub-badge" style="color:${repColor}">⭐ ${data.reputation} reputation</span>
              <span class="pub-badge">${data.referral_count || 0} referrals</span>
            </div>
          </div>
        </div>

        <!-- Stats -->
        <div class="stat-grid" style="margin-bottom:32px">
          <div class="stat-box"><div class="stat-val">${data.points}</div><div class="stat-lbl">Points</div></div>
          <div class="stat-box"><div class="stat-val">${data.tasks_completed}</div><div class="stat-lbl">Tasks done</div></div>
          <div class="stat-box"><div class="stat-val">${data.tasks_posted}</div><div class="stat-lbl">Tasks posted</div></div>
          <div class="stat-box"><div class="stat-val">${data.streak||0}🔥</div><div class="stat-lbl">Streak</div></div>
        </div>

        <!-- Achievements -->
        ${data.achievements && data.achievements.length ? `
          <div class="section-title">Achievements</div>
          <div class="ach-mini" style="margin-bottom:32px">
            ${data.achievements.map(a => `
              <div class="ach-mini-chip" title="${esc(a.description)}">
                ${a.icon} ${esc(a.title)}
              </div>`).join('')}
          </div>` : ''}

        <!-- Active Tasks -->
        ${data.active_tasks && data.active_tasks.length ? `
          <div class="section-title">Active Tasks</div>
          <div class="task-feed" style="margin-bottom:32px">
            ${data.active_tasks.map(t => {
              const slotsLeft = t.max_completions - t.completions_count;
              return `<div class="task-card">
                <div class="task-plat-icon ${platClass(t.platform)}">${PLAT_EMOJI[t.platform]||'🌐'}</div>
                <div class="task-info">
                  <h4>${esc(t.target)}</h4>
                  <p>${esc(t.description || TYPE_LABEL[t.type] + ' on ' + t.platform)}</p>
                </div>
                <div class="task-actions">
                  <span class="type-badge type-${t.type}">${TYPE_LABEL[t.type]}</span>
                  <span class="pts-badge">+${t.points_reward} pts</span>
                  <span class="slots-badge">${slotsLeft}/${t.max_completions}</span>
                  <a href="/earn/" class="btn btn-primary btn-sm">Start ↗</a>
                </div>
              </div>`;
            }).join('')}
          </div>` : ''}

        <div style="text-align:center;padding-top:20px;border-top:1px solid var(--border)">
          <a href="/signup/" class="btn btn-primary">Join Next Boost to earn points →</a>
        </div>
      </div>`;
    }

    function platClass(p) {
      const m = { tiktok:'plat-tiktok', instagram:'plat-instagram', youtube:'plat-youtube', discord:'plat-discord', website:'plat-website', twitch:'plat-twitch' };
      return m[p] || '';
    }
  </script>
</body>
</html>
