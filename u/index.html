<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Profile — Next Boost</title>
  <meta name="description" content="View this creator's profile on Next Boost — their stats, badges, active tasks and more."/>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/img/favicon-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/img/favicon-512.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <link rel="stylesheet" href="/assets/css/app.css"/>
  <style>
    /* ── Layout ── */
    .pub-wrap {
      max-width: 660px;
      margin: 0 auto;
      padding: 24px 16px 120px;
    }

    /* ── Hero card ── */
    .pub-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .pub-banner {
      height: 80px;
      background: linear-gradient(135deg, #E8621A 0%, #C4430A 100%);
      position: relative;
    }
    .pub-avatar-wrap {
      position: absolute;
      bottom: -36px;
      left: 24px;
    }
    .pub-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.9rem; font-weight: 700; color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      border: 3px solid var(--surface);
    }
    .pub-info {
      padding: 44px 24px 20px;
    }
    .pub-name {
      font-size: 1.3rem; font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      margin-bottom: 2px;
    }
    .pub-handle { font-size: 0.82rem; color: var(--muted); margin-bottom: 10px; }
    .pub-bio    { font-size: 0.86rem; color: var(--muted); line-height: 1.6; margin-bottom: 12px; }
    .pub-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .pub-badge  {
      font-size: 0.7rem; border: 1px solid var(--border2);
      border-radius: 999px; padding: 2px 9px; font-weight: 600;
      color: var(--muted);
    }

    /* ── Stats strip ── */
    .pub-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid var(--border);
    }
    .pub-stat {
      padding: 14px 8px; text-align: center;
      border-right: 1px solid var(--border);
    }
    .pub-stat:last-child { border-right: none; }
    .pub-stat-val {
      font-size: 1.1rem; font-weight: 700;
      color: var(--orange);
      font-family: 'Space Grotesk', sans-serif;
    }
    .pub-stat-lbl {
      font-size: 0.62rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-top: 3px;
    }

    /* ── Follow button ── */
    .pub-follow-wrap {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px;
    }

    /* ── Social links ── */
    .pub-socials {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 0 24px 20px;
    }
    .pub-social-link {
      width: 34px; height: 34px; border-radius: 9px;
      background-size: 55% 55%; background-repeat: no-repeat; background-position: center;
      transition: transform .15s, opacity .15s; opacity: 0.9;
    }
    .pub-social-link:hover { transform: translateY(-2px); opacity: 1; }

    /* ── Section titles ── */
    .pub-section {
      margin-bottom: 16px;
    }
    .pub-section-title {
      font-size: 0.88rem; font-weight: 700;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 10px;
    }

    /* ── Task cards ── */
    .pub-task {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 16px;
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }
    .pub-task:hover { border-color: var(--orange); }
    .pub-task-info { flex: 1; min-width: 0; }
    .pub-task-name {
      font-size: 0.86rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .pub-task-sub { font-size: 0.74rem; color: var(--muted); margin-top: 2px; }

    /* ── Achievements ── */
    .pub-ach-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .pub-ach {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 9px 13px;
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem;
    }

    /* ── Mobile ── */
    @media (max-width: 520px) {
      .pub-stats { grid-template-columns: repeat(2, 1fr); }
      .pub-stat { border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>
<!-- Nav (populated by initApp or guest version) -->
<nav class="nav" id="main-nav"></nav>

<div class="pub-wrap">
  <div id="pub-root">
    <!-- Skeleton -->
    <div class="pub-hero">
      <div class="pub-banner">
        <div class="pub-avatar-wrap"><div class="skeleton pub-avatar"></div></div>
      </div>
      <div class="pub-info">
        <div class="skeleton skeleton-line" style="width:45%;margin-bottom:8px"></div>
        <div class="skeleton skeleton-line short" style="width:30%;margin-bottom:12px"></div>
        <div class="skeleton skeleton-line" style="width:75%"></div>
      </div>
      <div class="pub-stats">
        <div class="pub-stat"><div class="skeleton" style="height:18px;margin:0 auto;width:36px;border-radius:4px"></div></div>
        <div class="pub-stat"><div class="skeleton" style="height:18px;margin:0 auto;width:24px;border-radius:4px"></div></div>
        <div class="pub-stat"><div class="skeleton" style="height:18px;margin:0 auto;width:24px;border-radius:4px"></div></div>
        <div class="pub-stat"><div class="skeleton" style="height:18px;margin:0 auto;width:28px;border-radius:4px"></div></div>
      </div>
    </div>
  </div>
</div>

<nav class="mobile-nav-bar" id="mobile-nav"></nav>

<script type="module">
import { supabase, esc, PLAT_CLASS, SOCIAL_PLATFORMS, getRank } from '/assets/js/shared.js';
import { initApp } from '/assets/js/app.js';
import { iconSVG } from '/src/icons.js';

const PC   = { tiktok:'plat-tiktok', instagram:'plat-instagram', youtube:'plat-youtube', discord:'plat-discord', twitch:'plat-twitch', twitter:'plat-twitter', website:'plat-website' };
const TL   = { follow:'Follow', like:'Like', view:'View', join:'Join', website:'Visit', retweet:'Retweet' };
const PLAT = { tiktok:'TikTok', instagram:'Instagram', youtube:'YouTube', discord:'Discord', twitch:'Twitch', twitter:'Twitter/X', website:'Website' };

function getUsernameFromUrl() {
  // Handles /u/?u=Clxxdy (after 404 redirect) AND direct /u/Clxxdy if ever supported
  const qs = new URLSearchParams(location.search).get('u');
  if (qs) return qs;
  const parts = location.pathname.split('/').filter(Boolean);
  if (parts[0] === 'u' && parts[1]) return decodeURIComponent(parts[1]);
  return null;
}

async function main() {
  // Try to init nav — catch redirect for guests (initApp redirects non-logged-in to /login/)
  // We want public profiles to be viewable by guests too, so we catch the failure
  let ctx = null;
  let myCompletedTaskIds = new Set();

  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      ctx = await initApp('u');
      // Load tasks this user already completed so we can mark them
      const { data: myC } = await supabase
        .from('completions')
        .select('task_id')
        .eq('user_id', session.user.id)
        .in('status', ['approved', 'pending']);
      myCompletedTaskIds = new Set((myC||[]).map(c => c.task_id));
    } else {
      // Guest — render a minimal nav
      const nav = document.getElementById('main-nav');
      if (nav) nav.innerHTML = `
        <a class="nav-logo" href="/"><img loading="eager" decoding="async" src="/assets/img/logo.png" alt="Next Boost" style="height:36px;width:auto"/></a>
        <div class="nav-links">
          <a href="/login/"  class="btn btn-ghost btn-sm">Log in</a>
          <a href="/signup/" class="btn btn-primary btn-sm">Sign up</a>
        </div>`;
    }
  } catch(e) { /* guest — already handled above */ }

  const username = getUsernameFromUrl();
  if (!username) {
    document.getElementById('pub-root').innerHTML = `<div class="empty-state"><div class="empty-icon">${iconSVG('search',28)}</div><p>No username specified.</p><div class="empty-cta"><a href="/leaderboard/" class="btn btn-primary btn-sm">Browse creators</a></div></div>`;
    return;
  }

  const { data: p, error } = await supabase.rpc('get_user_profile', { p_username: username });

  if (error || !p) {
    document.getElementById('pub-root').innerHTML = `<div class="empty-state"><div class="empty-icon">${iconSVG('user',28)}</div><p>User <strong>@${esc(username)}</strong> not found.</p><div class="empty-cta"><a href="/leaderboard/" class="btn btn-primary btn-sm">Browse creators</a></div></div>`;
    return;
  }

  document.title = `${p.display_name || p.username} (@${p.username}) — Next Boost`;

  const ini = (p.display_name || p.username || '?')[0].toUpperCase();
  const avatarHtml = p.avatar_url
    ? `<img src="${p.avatar_url}" loading="lazy" decoding="async" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid var(--surface)" alt=""/>`
    : `<div class="pub-avatar" style="background:${p.avatar_color||'var(--orange)'}">${ini}</div>`;

  // Badges
  const badges = [];
  const rank = getRank(p);
  badges.push(`<span class="pub-badge" style="color:${rank.color};border-color:${rank.color}44;background:${rank.color}18" title="${esc(rank.name)} rank — based on points, tasks completed, and trust">${iconSVG(rank.icon,13)} ${esc(rank.name)}</span>`);
  if (p.is_verified) badges.push(`<span class="pub-badge" style="color:#60a5fa;border-color:#60a5fa44">${iconSVG('circle-check',12)} Verified</span>`);
  const ts = p.trust_score || 0;
  if (ts > 0) {
    const tc = ts >= 80 ? '#4ade80' : ts >= 50 ? '#f59e0b' : '#94a3b8';
    badges.push(`<span class="pub-badge" style="color:${tc};border-color:${tc}44">${iconSVG('shield-check',12)} Trust ${ts}/100</span>`);
  }
  if ((p.streak||0) >= 7) badges.push(`<span class="pub-badge">${iconSVG('flame',12)} ${p.streak}d streak</span>`);
  if (p.rank) badges.push(`<span class="pub-badge">${iconSVG('trending-up',12)} Leaderboard #${p.rank}</span>`);

  const isOwn    = p.is_own_profile;
  const isFollow = p.viewer_is_following;

  // Follow + view profile buttons
  let followWrap = '';
  if (isOwn) {
    followWrap = `<a href="/profile/" class="btn btn-primary" style="flex:1">Edit my profile →</a>`;
  } else if (ctx) {
    followWrap = `
      <button id="pub-follow-btn" class="btn ${isFollow ? 'btn-ghost' : 'btn-primary'}" style="flex:1" onclick="toggleFollow('${p.id}',this)">
        ${isFollow ? `${iconSVG('check',13)} Following` : `${iconSVG('users',13)} Follow`}
      </button>`;
  } else {
    followWrap = `<a href="/signup/" class="btn btn-primary" style="flex:1">Sign up to follow</a>`;
  }

  // Tasks — check each against already-completed set
  const tasks = p.active_tasks || [];
  const tasksHtml = tasks.length ? tasks.map(t => {
    const slots = t.max_completions - t.completions_count;
    const done  = myCompletedTaskIds.has(t.id);
    let action  = '';
    if (!ctx) {
      action = `<a href="/signup/" class="btn btn-ghost btn-sm" style="font-size:0.75rem;padding:4px 10px;white-space:nowrap">Sign up ↗</a>`;
    } else if (isOwn) {
      action = `<span class="pts-badge" style="opacity:0.5">Your task</span>`;
    } else if (done) {
      action = `<span class="pts-badge" style="background:rgba(74,222,128,0.1);color:#4ade80;border-color:#4ade8044">${iconSVG('circle-check',12)} Done</span>`;
    } else if (slots <= 0) {
      action = `<span class="pts-badge" style="opacity:0.5">Full</span>`;
    } else {
      action = `<button class="btn btn-primary btn-sm" style="font-size:0.75rem;padding:4px 10px;white-space:nowrap" onclick="startTask('${t.id}')">Start ↗</button>`;
    }
    return `<div class="pub-task">
      <div class="task-plat-icon ${PC[t.platform]||'plat-website'}"></div>
      <div class="pub-task-info">
        <div class="pub-task-name">${esc(PLAT[t.platform]||t.platform)} — ${TL[t.type]||t.type}</div>
        <div class="pub-task-sub">${slots} slots left · +${t.points_reward} pts${t.is_boosted ? ` · ${iconSVG('zap',11)} Boosted` : ''}</div>
      </div>
      ${action}
    </div>`;
  }).join('') : '';

  // Achievements
  const achs = p.achievements || [];
  const achsHtml = achs.length ? `
    <div class="pub-ach-grid">
      ${achs.map(a => `<div class="pub-ach" title="${esc(a.description||a.title)}"><span style="display:inline-flex">${iconSVG(a.icon,20) || iconSVG('award',20)}</span><span>${esc(a.title)}</span></div>`).join('')}
    </div>` : '';

  const joined = p.created_at ? new Date(p.created_at).toLocaleDateString('en-US',{month:'long',year:'numeric'}) : '';

  // Social links
  const social = p.social_links || {};
  const socialsHtml = SOCIAL_PLATFORMS.filter(sp => social[sp.key]).map(sp =>
    `<a class="pub-social-link ${PLAT_CLASS[sp.key]}" href="${esc(social[sp.key])}" target="_blank" rel="noopener noreferrer nofollow" title="${esc(sp.label)}"></a>`
  ).join('');

  document.getElementById('pub-root').innerHTML = `
    <!-- Hero card -->
    <div class="pub-hero">
      <div class="pub-banner">
        <div class="pub-avatar-wrap">${avatarHtml}</div>
      </div>
      <div class="pub-info">
        ${badges.length ? `<div class="pub-badges">${badges.join('')}</div>` : ''}
        <div class="pub-name">${esc(p.display_name||p.username)}</div>
        <div class="pub-handle">@${esc(p.username)}${joined ? ` · Joined ${joined}` : ''}</div>
        ${p.bio ? `<div class="pub-bio">${esc(p.bio)}</div>` : ''}
      </div>
      <div class="pub-stats">
        <div class="pub-stat"><div class="pub-stat-val">${(p.points||0).toLocaleString()}</div><div class="pub-stat-lbl">Points</div></div>
        <div class="pub-stat"><div class="pub-stat-val">${p.tasks_completed||0}</div><div class="pub-stat-lbl">Done</div></div>
        <div class="pub-stat"><div class="pub-stat-val">${p.followers_count||0}</div><div class="pub-stat-lbl">Followers</div></div>
        <div class="pub-stat"><div class="pub-stat-val" style="display:flex;align-items:center;justify-content:center;gap:4px">${p.streak||0} ${iconSVG('flame',15)}</div><div class="pub-stat-lbl">Streak</div></div>
      </div>
      ${socialsHtml ? `<div class="pub-socials">${socialsHtml}</div>` : ''}
      <div class="pub-follow-wrap">${followWrap}</div>
    </div>

    ${tasksHtml ? `<div class="pub-section"><div class="pub-section-title">Active tasks (${tasks.length})</div>${tasksHtml}</div>` : ''}
    ${achsHtml  ? `<div class="pub-section"><div class="pub-section-title">Achievements (${achs.length})</div>${achsHtml}</div>` : ''}
    ${!tasksHtml && !achsHtml ? `<div class="empty-state"><div class="empty-icon">${iconSVG('recycle',28)}</div><p>This creator is just getting started.</p></div>` : ''}
  `;
}

window.toggleFollow = async (userId, btn) => {
  const wasFollowing = btn.textContent.trim().includes('Following');
  btn.disabled = true; btn.textContent = '…';
  if (wasFollowing) {
    await supabase.rpc('unfollow_user', { p_target_id: userId });
    btn.textContent = '+ Follow'; btn.className = 'btn btn-primary'; btn.style.flex = '1';
  } else {
    await supabase.rpc('follow_user', { p_target_id: userId });
    btn.innerHTML = `${iconSVG('check',13)} Following`; btn.className = 'btn btn-ghost'; btn.style.flex = '1';
  }
  btn.disabled = false;
};

// Open the task modal on earn page via deep link
window.startTask = (taskId) => {
  window.location.href = `/earn/?task=${taskId}`;
};

main();
</script>
</body>
</html>
