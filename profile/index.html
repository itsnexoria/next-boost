<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — Next Boost</title><meta name="robots" content="noindex"/>
  
  <link rel="preconnect" href="https://slufbzzfofzptwjefzmu.supabase.co"/>
  <link rel="dns-prefetch" href="https://slufbzzfofzptwjefzmu.supabase.co"/>
  <link rel="manifest" href="/manifest.json"/><meta name="theme-color" content="#E8621A"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <link rel="apple-touch-icon" href="/assets/img/logo.png"/>
  <link rel="icon" href="/assets/img/favicon.svg?v=2" type="image/svg+xml"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <link rel="stylesheet" href="/assets/css/app.css"/>
  <style>
    /* Edit modal */
    .edit-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      z-index: 1000; align-items: center; justify-content: center; padding: 16px;
    }
    .edit-modal-overlay.open { display: flex; }
    .edit-modal {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 18px; width: 100%; max-width: 480px;
      padding: 28px; max-height: 90vh; overflow-y: auto;
    }
    .edit-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .edit-modal-header h2 { font-size: 1.1rem; margin: 0; }
    .edit-modal-close {
      width: 32px; height: 32px; border-radius: 50%; border: none;
      background: var(--surface2); color: var(--muted); font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: .15s;
    }
    .edit-modal-close:hover { background: var(--surface3); color: var(--text); }

    /* Avatar upload area in modal */
    .avatar-upload-area {
      display: flex; align-items: center; gap: 16px; margin-bottom: 24px;
    }
    .avatar-upload-circle {
      width: 80px; height: 80px; border-radius: 50%; overflow: hidden;
      background: var(--surface2); flex-shrink: 0; position: relative;
      cursor: pointer; border: 2px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 700; color: #fff;
      font-family: 'Space Grotesk', sans-serif; transition: .2s;
    }
    .avatar-upload-circle:hover .avatar-overlay { opacity: 1; }
    .avatar-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: .2s; font-size: 1.4rem; border-radius: 50%;
    }
    .avatar-upload-info { display: flex; flex-direction: column; gap: 6px; }

    /* Colour swatches in modal */
    .avatar-color-grid {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px;
    }
    .avatar-color-btn {
      width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent;
      cursor: pointer; transition: .15s; flex-shrink: 0;
    }
    .avatar-color-btn:hover { transform: scale(1.15); }
    .avatar-color-btn.selected { border-color: #fff; box-shadow: 0 0 0 2px var(--orange); }

    /* Profile card */
    .profile-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px; margin-bottom: 20px;
    }
    .profile-header {
      display: flex; align-items: flex-start; gap: 20px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .profile-avatar-wrap { position: relative; flex-shrink: 0; }
    .profile-avatar-xl {
      width: 80px; height: 80px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 700; color: #fff;
      font-family: 'Space Grotesk', sans-serif; overflow: hidden;
    }
    .profile-edit-btn {
      position: absolute; bottom: 0; right: 0;
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--orange); border: 2px solid var(--surface);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 0.75rem; color: #fff; transition: .15s;
    }
    .profile-edit-btn:hover { transform: scale(1.1); }
    .profile-meta { flex: 1; min-width: 0; }
    .profile-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 2px; }
    .profile-username { color: var(--muted); font-size: 0.88rem; margin-bottom: 8px; }
    .profile-bio { font-size: 0.9rem; color: var(--text); line-height: 1.6; margin-bottom: 12px; }
    .profile-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .profile-badge {
      font-size: 0.75rem; padding: 2px 10px; border-radius: 999px;
      background: var(--surface2); border: 1px solid var(--border2); color: var(--muted);
    }
    .edit-profile-full-btn {
      margin-top: 16px; display: inline-flex; align-items: center; gap: 6px;
    }
  </style>
</head>
<body>
<nav class="nav" id="main-nav"></nav>
<div class="app-shell">
  <aside class="app-sidebar" id="app-sidebar"></aside>
  <div class="page-content">
    <div id="profile-content"><div class="spinner"></div></div>
  </div>
</div>
<nav class="mobile-nav-bar" id="mobile-nav"></nav>

<!-- EDIT PROFILE MODAL -->
<div class="edit-modal-overlay" id="edit-modal" onclick="if(event.target===this)closeEditModal()">
  <div class="edit-modal">
    <div class="edit-modal-header">
      <h2>Edit profile</h2>
      <button class="edit-modal-close" onclick="closeEditModal()">✕</button>
    </div>

    <!-- Avatar -->
    <div class="avatar-upload-area">
      <div class="avatar-upload-circle" id="modal-avatar" onclick="document.getElementById('avatar-file-input').click()">
        <div class="avatar-overlay">📷</div>
      </div>
      <div class="avatar-upload-info">
        <label class="btn btn-ghost btn-sm" style="cursor:pointer">
          📷 Upload photo
          <input type="file" id="avatar-file-input" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none" onchange="handleAvatarFile(this)"/>
        </label>
        <button class="btn btn-ghost btn-sm" id="remove-avatar-btn" onclick="removeAvatar()" style="display:none">🗑 Remove</button>
        <div style="font-size:0.72rem;color:var(--muted)">JPG, PNG, WebP · max 2MB</div>
        <div id="avatar-upload-progress" style="display:none;font-size:0.78rem;color:var(--orange)"></div>
      </div>
    </div>

    <!-- Colour picker (fallback when no photo) -->
    <div class="form-group" id="color-picker-row">
      <label class="form-label">Avatar colour <span style="color:var(--muted);font-size:0.75rem">(used when no photo)</span></label>
      <div class="avatar-color-grid" id="avatar-color-grid"></div>
    </div>

    <!-- Display name -->
    <div class="form-group">
      <label class="form-label">Display name</label>
      <input type="text" id="modal-display-name" maxlength="32" placeholder="Your name" style="width:100%"/>
    </div>

    <!-- Bio -->
    <div class="form-group">
      <label class="form-label" style="display:flex;justify-content:space-between">
        Bio <span style="color:var(--muted);font-size:0.75rem;font-weight:400"><span id="bio-count">0</span>/160</span>
      </label>
      <textarea id="modal-bio" maxlength="160" rows="3" placeholder="Tell the community about yourself…" style="width:100%;resize:vertical;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-family:inherit;font-size:0.9rem"></textarea>
    </div>

    <!-- Read-only -->
    <div class="form-group">
      <label class="form-label">Username <span style="color:var(--muted);font-size:0.75rem;font-weight:400">(cannot change)</span></label>
      <input type="text" id="modal-username-display" disabled style="width:100%;opacity:0.5;cursor:not-allowed"/>
    </div>

    <div class="error-msg" id="modal-err" style="margin-bottom:12px"></div>

    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" style="flex:1" onclick="saveProfile()">Save changes</button>
      <button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
    </div>
  </div>
</div>

<script type="module">
import { supabase, esc } from '/assets/js/shared.js';
import { initApp, updateNavPoints } from '/assets/js/app.js';

const COLORS = ['#E8621A','#C4430A','#7c3aed','#0ea5e9','#22c55e','#ec4899','#f59e0b','#14b8a6','#ef4444','#64748b'];
let profile, pendingColor;

async function main() {
  const ctx = await initApp('profile');
  if (!ctx) return;
  profile = ctx.profile;
  pendingColor = profile.avatar_color || '#E8621A';
  renderProfile(ctx.email);
}

function renderProfile(email) {
  const ini = (profile.display_name || profile.username || 'U')[0].toUpperCase();
  const wrap = document.getElementById('profile-content');

  const avatarHtml = profile.avatar_url
    ? `<img src="${profile.avatar_url}" style="width:100%;height:100%;object-fit:cover" alt="avatar"/>`
    : `<span>${ini}</span>`;
  const avatarBg = profile.avatar_url ? '#000' : (profile.avatar_color || '#E8621A');

  const rep = profile.reputation || 0;
  const repColor = rep >= 50 ? 'var(--green)' : rep >= 0 ? 'var(--amber)' : 'var(--red)';

  wrap.innerHTML = `
    <div class="profile-card">
      <div class="profile-header">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar-xl" style="background:${avatarBg}">${avatarHtml}</div>
          <button class="profile-edit-btn" onclick="openEditModal()" title="Edit profile">✏️</button>
        </div>
        <div class="profile-meta">
          <div class="profile-name">${esc(profile.display_name || profile.username)}</div>
          <div class="profile-username">@${esc(profile.username)}</div>
          ${profile.bio ? `<div class="profile-bio">${esc(profile.bio)}</div>` : ''}
          <div class="profile-badges">
            ${profile.is_admin ? '<span class="profile-badge" style="color:var(--orange);border-color:var(--orange)">🛡️ Admin</span>' : ''}
            ${profile.is_verified ? '<span class="profile-badge" style="color:#60a5fa;border-color:#60a5fa;background:rgba(96,165,250,0.1)" title="Verified Creator">✓ Verified Creator</span>' : ''}
            ${(profile.trust_score||0) > 0 ? `<span class="profile-badge" style="color:${(profile.trust_score||0)>=80?'#4ade80':(profile.trust_score||0)>=50?'#f59e0b':'#94a3b8'};border-color:currentColor" title="Creator Trust Score — based on activity, completions & streak">🛡 Trust ${profile.trust_score}/100</span>` : ''}
            ${(profile.reputation||0) >= 80 ? '<span class="profile-badge" style="color:var(--green);border-color:var(--green)">⭐ Trusted</span>' : ''}
            ${(profile.streak||0) >= 7 ? `<span class="profile-badge">🔥 ${profile.streak}d streak</span>` : ''}
          </div>
          <button class="btn btn-ghost btn-sm edit-profile-full-btn" onclick="openEditModal()">✏️ Edit profile</button>
        </div>
      </div>

      <div class="stat-grid">
        <div class="stat-box"><div class="stat-val">${(profile.points||0).toLocaleString()}</div><div class="stat-lbl">Points</div></div>
        <div class="stat-box"><div class="stat-val">${profile.tasks_completed||0}</div><div class="stat-lbl">Completed</div></div>
        <div class="stat-box"><div class="stat-val">${profile.tasks_posted||0}</div><div class="stat-lbl">Posted</div></div>
        <div class="stat-box"><div class="stat-val">${profile.streak||0}🔥</div><div class="stat-lbl">Streak</div></div>
        <div class="stat-box" id="followers-box"><div class="stat-val" id="followers-count">—</div><div class="stat-lbl">Followers</div></div>
        <div class="stat-box" id="following-box"><div class="stat-val" id="following-count">—</div><div class="stat-lbl">Following</div></div>
        <div class="stat-box"><div class="stat-val" style="color:${repColor}">${rep}</div><div class="stat-lbl">Reputation</div></div>
      </div>
    </div>

    <div class="card card-pad" style="margin-bottom:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h3 style="font-size:0.95rem;margin:0">Point history</h3>
        <a href="/completed/" style="font-size:0.8rem;color:var(--orange)">View completed →</a>
      </div>
      <div id="ledger-feed"><div class="spinner" style="margin:20px auto"></div></div>
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <a href="/share/" class="btn btn-ghost btn-sm">🎉 Share your win</a>
      <button class="btn btn-danger btn-sm" onclick="doSignOut()">Sign out</button>
    </div>`;

  loadLedger();

  // Load follow stats
  supabase.rpc('get_follow_stats', { p_user_id: profile.id }).then(({ data }) => {
    if (!data) return;
    const fc = document.getElementById('followers-count');
    const fgc = document.getElementById('following-count');
    if (fc) fc.textContent = data.followers.toLocaleString();
    if (fgc) fgc.textContent = data.following.toLocaleString();
  });
}

async function loadLedger() {
  const feed = document.getElementById('ledger-feed');
  const { data } = await supabase.from('point_ledger').select('*')
    .eq('user_id', profile.id).order('created_at', { ascending: false }).limit(30);
  const LABELS = {
    task_approved:'✓ Task completed', task_posted:'📤 Posted a task',
    signup_bonus:'🎉 Signup bonus', daily_bonus:'🎁 Daily bonus',
    task_refund:'↩ Close refund', task_expired_refund:'⏰ Expired refund',
    achievement_reward:'🎖️ Achievement', referral_bonus:'🤝 Referral bonus',
    referral_reward:'🤝 Referral reward', task_boost:'⚡ Task boosted',
    admin_adjustment:'🛡️ Admin adjustment', slot_purchase:'🎰 Slot purchase',
    boost_purchased:'⚡ Boost purchased',
  };
  if (!data || !data.length) {
    feed.innerHTML = '<p style="color:var(--muted);font-size:0.85rem">No history yet.</p>';
    return;
  }
  feed.innerHTML = data.map(e => `
    <div class="ledger-row">
      <span class="ledger-reason">${LABELS[e.reason] || e.reason}</span>
      <span class="ledger-delta ${e.delta > 0 ? 'delta-pos' : 'delta-neg'}">${e.delta > 0 ? '+' : ''}${e.delta}</span>
    </div>`).join('');
}

// ---- EDIT MODAL ----
window.openEditModal = () => {
  // Populate fields
  document.getElementById('modal-display-name').value = profile.display_name || '';
  document.getElementById('modal-bio').value = profile.bio || '';
  document.getElementById('modal-username-display').value = profile.username || '';
  document.getElementById('bio-count').textContent = (profile.bio || '').length;
  document.getElementById('modal-err').textContent = '';

  // Avatar preview
  updateModalAvatar();

  // Build colour swatches
  const grid = document.getElementById('avatar-color-grid');
  grid.innerHTML = COLORS.map(c => `
    <button class="avatar-color-btn ${c === pendingColor ? 'selected' : ''}"
      style="background:${c}" onclick="pickColor('${c}',this)" title="${c}"></button>
  `).join('') + `<input type="color" value="${pendingColor}" title="Custom colour"
      style="width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;padding:0;flex-shrink:0"
      onchange="pickColor(this.value,this)"/>`;

  // Remove avatar btn visibility
  document.getElementById('remove-avatar-btn').style.display = profile.avatar_url ? 'block' : 'none';

  // Bio counter
  const bioEl = document.getElementById('modal-bio');
  bioEl.oninput = () => document.getElementById('bio-count').textContent = bioEl.value.length;

  document.getElementById('edit-modal').classList.add('open');
};

window.closeEditModal = () => {
  document.getElementById('edit-modal').classList.remove('open');
};

function updateModalAvatar() {
  const el = document.getElementById('modal-avatar');
  if (!el) return;
  const ini = (profile.display_name || profile.username || 'U')[0].toUpperCase();
  if (profile.avatar_url) {
    el.style.background = '#000';
    el.innerHTML = `<img src="${profile.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/><div class="avatar-overlay">📷</div>`;
  } else {
    el.style.background = pendingColor;
    el.innerHTML = `<span style="font-size:2rem;font-weight:700;font-family:'Space Grotesk',sans-serif">${ini}</span><div class="avatar-overlay">📷</div>`;
  }
}

window.pickColor = (color, btn) => {
  pendingColor = color;
  if (!profile.avatar_url) {
    document.getElementById('modal-avatar').style.background = color;
  }
  document.querySelectorAll('.avatar-color-btn').forEach(b => b.classList.remove('selected'));
  if (btn.classList.contains('avatar-color-btn')) btn.classList.add('selected');
};

window.handleAvatarFile = async (input) => {
  const file = input.files[0];
  if (!file) return;
  const prog = document.getElementById('avatar-upload-progress');
  const errEl = document.getElementById('modal-err');
  if (file.size > 2 * 1024 * 1024) { errEl.textContent = 'File too large — max 2MB.'; return; }

  prog.style.display = 'block'; prog.textContent = 'Uploading…';

  // Local preview
  const localUrl = URL.createObjectURL(file);
  profile.avatar_url = localUrl;
  updateModalAvatar();

  const ext = file.name.split('.').pop().toLowerCase() || 'jpg';
  const filePath = `${profile.id}/avatar.${ext}`;

  const { error: upErr } = await supabase.storage.from('avatars').upload(filePath, file, { upsert: true, contentType: file.type });
  if (upErr) { prog.textContent = 'Upload failed: ' + upErr.message; profile.avatar_url = null; updateModalAvatar(); return; }

  const { data: { publicUrl } } = supabase.storage.from('avatars').getPublicUrl(filePath);
  const avatarUrl = publicUrl + '?t=' + Date.now();

  const { error: dbErr } = await supabase.from('profiles').update({ avatar_url: avatarUrl }).eq('id', profile.id);
  if (dbErr) { prog.textContent = 'Save failed: ' + dbErr.message; return; }

  profile.avatar_url = avatarUrl;
  prog.style.display = 'none';
  document.getElementById('remove-avatar-btn').style.display = 'block';
  updateModalAvatar();
  renderProfile(null);
  input.value = '';
};

window.removeAvatar = async () => {
  const { error } = await supabase.from('profiles').update({ avatar_url: null }).eq('id', profile.id);
  if (error) { document.getElementById('modal-err').textContent = error.message; return; }
  profile.avatar_url = null;
  document.getElementById('remove-avatar-btn').style.display = 'none';
  updateModalAvatar();
  renderProfile(null);
};

window.saveProfile = async () => {
  const name = document.getElementById('modal-display-name').value.trim();
  const bio = document.getElementById('modal-bio').value.trim();
  const errEl = document.getElementById('modal-err');
  errEl.textContent = ''; errEl.style.color = '';

  const { data, error } = await supabase.rpc('update_profile', {
    p_display_name: name || null,
    p_bio: bio || null,
    p_avatar_color: pendingColor
  });

  if (error || data?.error) {
    errEl.textContent = data?.error || error.message;
    return;
  }

  profile.display_name = name || profile.username;
  profile.bio = bio;
  profile.avatar_color = pendingColor;

  errEl.style.color = 'var(--green)';
  errEl.textContent = '✓ Saved!';
  setTimeout(() => {
    errEl.textContent = '';
    closeEditModal();
    renderProfile(null);
  }, 800);
};

window.doSignOut = async () => {
  await supabase.auth.signOut();
  window.location.href = '/login/';
};

main();
</script>
</body>
</html>
